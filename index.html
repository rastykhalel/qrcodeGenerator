<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rasty QR Code Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎨 Rasty QR Code Generator</h1>

    <div class="controls">
      <label>Text or URL:</label>
      <input type="text" id="qrText" value="https://example.com" />

    <label>QR Dot Style:</label>
<select id="style">
  <option value="square">Square</option>
  <option value="dots">Dots</option>
  <option value="rounded">Rounded</option>
</select>

<label>Corner Square Style:</label>
<select id="cornerSquare">
  <option value="square">Square</option>
  <option value="dot">Dot</option>
  <option value="extra-rounded">Extra Rounded</option>
</select>

<label>Corner Dot Style:</label>
<select id="cornerDot">
  <option value="square">Square</option>
  <option value="dot">Dot</option>
  <option value="extra-rounded">Extra Rounded</option>
</select>

      <label>Foreground Color:</label>
      <input type="color" id="fgColor" value="#000000" />

      <label>Background Color:</label>
      <input type="color" id="bgColor" value="#ffffff" />

      <button onclick="generateQR()">Generate QR</button>
    </div>

    <div id="qrcode" class="qrcode"></div>

    <div class="buttons">
      <button onclick="downloadQR('png')">Download PNG</button>
      <button onclick="downloadQR('svg')">Download SVG</button>
      <button onclick="downloadQR('pdf')">Download PDF</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
<script src="new.js"></script>

</body>
</html>
